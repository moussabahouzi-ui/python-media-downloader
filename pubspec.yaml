name: mediahub
description: "MediaHub — a premium, fully-local Android media downloader and manager."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- Routing ---
  go_router: ^14.2.0

  # --- Theming / Material You ---
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1

  # --- Networking / IO ---
  dio: ^5.5.0+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # --- Local persistence ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3+1

  # --- Serialization ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # --- Media playback (Phase 5) ---
  video_player: ^2.9.1
  just_audio: ^0.9.39
  audio_service: ^0.18.15

  # --- Utilities ---
  collection: ^1.18.0
  uuid: ^4.4.0
  logging: ^1.2.0
  visibility_detector: ^0.4.0+2

  # --- UI ---
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
